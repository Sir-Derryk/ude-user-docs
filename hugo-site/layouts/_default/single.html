<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ .Title }}</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #fafafa;
        }
        h1 {
            color: #10b981;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 10px;
        }
        pre {
            background-color: #1e1e1e;
            color: #d4d4d4;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: "Courier New", Courier, monospace;
        }
        code {
            font-family: "Courier New", Courier, monospace;
            background-color: #f3f4f6;
            padding: 2px 6px;
            border-radius: 4px;
        }
        pre code {
            background-color: transparent;
            padding: 0;
            border-radius: 0;
        }
        a {
            color: #10b981;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .back-link {
            display: block;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <a href="../" class="back-link">← Back to API Index</a>
    <article>
        <h1>{{ .Title }}</h1>
        {{ .Content }}
    </article>
</body>
</html>
