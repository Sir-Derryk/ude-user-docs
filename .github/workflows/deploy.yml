name: Deploy Documentation

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types: [rebuild-docs]
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout User Docs
        uses: actions/checkout@v4

      - name: Checkout Engine Repo
        uses: actions/checkout@v4
        with:
          repository: Sir-Derryk/universal-document-engine
          path: engine

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic jinja2 lxml
          pip install -e ./engine

      - name: Install Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Generate API Reference Markdown
        run: |
          PYTHONPATH=engine python -m ude.cli --config ude_config_self.json

      - name: Compile Hugo Site (API Reference)
        run: |
          hugo -s hugo-site -d ../.vitepress/public/api

      - name: Build VitePress Site
        run: |
          npm run docs:build

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
